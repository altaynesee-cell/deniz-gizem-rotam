name: Android APK Olustur

on:
  push:
    branches: [ "main", "master", "ana" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Zip dosyasini bul ve ac
        run: |
          echo "Repo dosyalari:"
          ls -la
          ZIP_FILE=$(ls *.zip | head -n 1)
          echo "Bulunan zip: $ZIP_FILE"
          unzip -q "$ZIP_FILE"

      - name: Proje klasorunu bul
        run: |
          echo "Acilan dosyalar:"
          ls -la
          PROJECT_DIR=$(find . -name gradlew -type f | head -n 1 | xargs dirname)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Proje klasoru: $PROJECT_DIR"

      - name: Gradle calistirma izni
        run: chmod +x "$PROJECT_DIR/gradlew"

      - name: APK olustur
        run: cd "$PROJECT_DIR" && ./gradlew assembleDebug

      - name: APK dosyasini yukle
        uses: actions/upload-artifact@v4
        with:
          name: DenizGizemRotam-debug-apk
          path: "**/app/build/outputs/apk/debug/app-debug.apk"        with:
          name: DenizGizemRotam-debug-apk
          path: DenizGizemRotam/app/build/outputs/apk/debug/app-debug.apk
